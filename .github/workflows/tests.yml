name: Tests

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      redis: &redis_service
        image: redis:8-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: RuboCop
        run: bundle exec rubocop
      - name: RSpec
        run: bundle exec rspec
        env:
          COVERAGE: 1
          TEST_REDIS_URL: redis://localhost

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test

  integration_tests:
    runs-on: ubuntu-latest
    services:
      redis: *redis_service
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Docker Build
        run: docker build -t redisflagd-ui .
      - name: Start redisflagd-ui container
        run: docker run -d --rm --name redisflagd-ui --add-host host.docker.internal:host-gateway -e REDIS_URL=redis://host.docker.internal -p 9292:9292 redisflagd-ui
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Integration Tests
        run: bundle exec rspec integration_spec
        env:
          TEST_REDIS_URL: redis://unused
      - name: Stop redisflagd-ui container
        run: docker stop redisflagd-ui
